<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>메일 전달 설정하기 · 크리에이터 되기</title>
<style>
  :root{--bg1:#fff1f2;--bg2:#eef2ff;--ink:#1f2937;--soft:#6b7280;--accent:#ef4444;--accent2:#f472b6;--good:#22c55e;--gblue:#1a73e8;--gred:#d93025;}
  *{box-sizing:border-box;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    color:var(--ink);background:linear-gradient(135deg,var(--bg1),var(--bg2));overflow:hidden;overscroll-behavior:none;touch-action:manipulation;}
  #app{height:100%;display:flex;flex-direction:column;align-items:center;padding:12px;max-width:1040px;margin:0 auto;}
  header{width:100%;text-align:center;position:relative;}
  h1{font-size:22px;margin:2px 0;} .sub{color:var(--soft);font-size:14px;margin:0 0 8px;}
  #langToggle{position:absolute;top:-2px;right:0;display:inline-flex;background:#fff;border:1px solid #e5e7eb;
    border-radius:999px;overflow:hidden;font-size:12px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:90;}
  #langToggle button{border:none;background:transparent;padding:6px 11px;cursor:pointer;color:#9ca3af;font-weight:700;}
  #langToggle button.on{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;}
  #homeBtn{position:absolute;top:-2px;left:0;display:inline-flex;align-items:center;text-decoration:none;
    background:#fff;border:1px solid #e5e7eb;border-radius:999px;font-size:12px;font-weight:700;color:var(--accent);
    padding:6px 11px;box-shadow:0 2px 6px rgba(0,0,0,.08);z-index:90;cursor:pointer;}
  #homeBtn .en{display:none;} html[lang="en"] #homeBtn .ko{display:none;} html[lang="en"] #homeBtn .en{display:inline;}
  #progressWrap{width:100%;height:12px;background:#ffe4e6;border-radius:999px;overflow:hidden;margin-bottom:4px;}
  #progressBar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .45s ease;}
  #stepText{font-size:12px;color:var(--soft);margin-bottom:8px;}
  #card{position:relative;width:100%;flex:1;display:flex;flex-direction:column;min-height:0;gap:10px;}
  button.ghostBtn{position:absolute;right:2px;top:-4px;font-size:12px;color:var(--soft);background:#fff;border:1px solid #e5e7eb;border-radius:999px;padding:6px 12px;cursor:pointer;z-index:80;}
  #mainView{flex:1;min-height:0;display:flex;flex-direction:column;gap:10px;}
  #banner{background:#fff;border-radius:16px;box-shadow:0 8px 22px rgba(239,68,68,.12);padding:10px 16px;text-align:center;position:relative;}
  #banner .t{font-size:19px;font-weight:800;} #banner .i{font-size:15px;margin-top:2px;line-height:1.5;} #banner .i b{color:var(--accent);}
  #banner .h{font-size:13px;color:var(--soft);margin-top:3px;}
  #stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(#f6f8fc,#eef1f7);border-radius:18px;box-shadow:0 10px 30px rgba(239,68,68,.10);padding:16px;overflow:auto;}

  .gmail{width:100%;max-width:600px;background:#fff;border-radius:14px;box-shadow:0 12px 34px rgba(0,0,0,.16);overflow:hidden;}
  .gtop{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #eee;}
  .gm-logo{color:var(--gred);font-weight:700;font-size:18px;} .gm-logo span{color:#5f6368;font-weight:500;}
  .gsearch{flex:1;background:#eaf1fb;border-radius:8px;padding:8px 12px;font-size:13px;color:#5f6368;}
  .ggear{font-size:20px;cursor:pointer;padding:4px 6px;border-radius:8px;}
  .gpanel{padding:14px 16px;min-height:220px;}
  .qmenu{position:absolute;} 
  .quickset{border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 10px 24px rgba(0,0,0,.14);padding:10px;max-width:280px;margin:0 0 0 auto;background:#fff;}
  .quickset .qh{font-weight:700;font-size:14px;margin-bottom:8px;color:#202124;}
  .qbtn{width:100%;text-align:left;border:1px solid #dadce0;background:#fff;border-radius:8px;padding:10px 12px;font-size:14px;cursor:pointer;color:#202124;}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid #e5e7eb;margin-bottom:12px;}
  .tab{padding:8px 12px;font-size:13.5px;color:#5f6368;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
  .tab.on{color:var(--gblue);border-bottom-color:var(--gblue);font-weight:700;}
  .setrow{font-size:14px;color:#202124;line-height:1.6;margin-bottom:12px;}
  .linkbtn{display:inline-block;border:1px solid #dadce0;border-radius:8px;padding:9px 14px;font-size:14px;color:#202124;cursor:pointer;background:#fff;font-weight:600;}
  .gfield{max-width:360px;margin:8px 0;}
  .gfield .gbox{border:1px solid #dadce0;border-radius:8px;padding:11px 13px;font-size:15px;color:#202124;}
  .gbtn{background:var(--gblue);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;}
  .radio{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:#202124;margin:9px 0;cursor:pointer;line-height:1.5;}
  .radio .rc{width:18px;height:18px;border:2px solid #5f6368;border-radius:50%;flex:none;margin-top:2px;position:relative;}
  .radio.sel .rc{border-color:var(--gblue);} .radio.sel .rc::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--gblue);}
  .radio b{color:#202124;}
  .savebar{margin-top:14px;text-align:center;}
  .done-badge{font-size:60px;}
  .flow{display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;font-weight:700;flex-wrap:wrap;margin-top:8px;}
  .flow .box{background:#e8f0fe;border-radius:10px;padding:8px 12px;}
  .flow .box.old{background:#fff1f2;}
  .story{max-width:600px;text-align:center;} .story .art{font-size:60px;} .story .txt{font-size:17px;line-height:1.7;color:#374151;} .story .txt b{color:var(--accent);}
  .gotBtn{margin-top:16px;font-size:17px;font-weight:800;color:#fff;border:none;cursor:pointer;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;padding:12px 26px;box-shadow:0 8px 20px rgba(239,68,68,.35);}
  .gotBtn:active{transform:translateY(1px);}
  .pulse{animation:pulse 1.2s infinite;} @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(26,115,232,.5);}50%{box-shadow:0 0 0 10px rgba(26,115,232,0);}}
  .pulseR{animation:pulseR 1.2s infinite;} @keyframes pulseR{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45);}50%{box-shadow:0 0 0 10px rgba(239,68,68,0);}}
  .tapme{cursor:pointer;}

  #finalScreen{display:none;flex:1;min-height:0;flex-direction:column;align-items:center;justify-content:center;
    background:#fff;border-radius:18px;box-shadow:0 10px 30px rgba(239,68,68,.12);padding:26px;text-align:center;}
  #finalScreen .tr{font-size:64px;}
  #finalScreen .big{margin-top:14px;font-size:17px;font-weight:800;color:#fff;border:none;cursor:pointer;
    background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;padding:12px 26px;}
  #successOverlay{display:none;position:absolute;inset:0;background:rgba(255,255,255,.82);border-radius:18px;
    flex-direction:column;align-items:center;justify-content:center;z-index:60;}
  #successOverlay .be{font-size:60px;} #successOverlay .msg{font-size:22px;font-weight:800;margin-top:6px;color:#111827;}
  .confetti{position:fixed;top:-40px;z-index:200;pointer-events:none;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:.9;}}
</style>
  <link rel="stylesheet" href="../_shared/twocol.css" />
</head>
<body>
<div id="app">
  <header>
    <div id="langToggle"><button data-l="ko">한국어</button><button data-l="en">EN</button></div>
    <a id="homeBtn" href="https://dthoma1.github.io/mom-games/becoming-a-content-creator/"><span class="ko">‹ 수업 목록</span><span class="en">‹ Lessons</span></a>
    <h1 id="h1"></h1>
    <p class="sub" id="sub"></p>
    <div id="progressWrap"><div id="progressBar"></div></div>
    <div id="stepText"></div>
  </header>
  <div id="card">
    <button class="ghostBtn" id="skipBtn" onclick="skipLevel()"></button>
    <div id="mainView">
      <div id="banner"><div class="t" id="bTitle"></div><div class="i" id="bInstr"></div><div class="h" id="bHint"></div></div>
      <div id="stage"></div>
    </div>
    <div id="finalScreen">
      <div class="tr">🏆</div>
      <div style="font-size:26px;font-weight:800;" id="finalTitle"></div>
      <div style="font-size:17px;margin-top:6px;max-width:620px;" id="finalMsg"></div>
      <button class="big" id="restartBtn" onclick="restart()"></button>
      <div style="margin-top:12px;"><a id="hubLink" href="https://dthoma1.github.io/mom-games/becoming-a-content-creator/" style="display:inline-block;text-decoration:none;font-size:15px;font-weight:700;color:var(--accent);background:#fff1f2;border:1px solid #fecaca;border-radius:999px;padding:10px 18px;"></a></div>
    </div>
    <div id="successOverlay"><div class="be">🎉</div><div class="msg" id="successMsg"></div></div>
  </div>
</div>

<script>
let LANG=localStorage.getItem("momLang")||"ko";
function T(o){ return (o&&typeof o==="object"&&("ko" in o))?(o[LANG]!=null?o[LANG]:o.ko):o; }
const UI={
  h1:{ko:"↪️ 메일 전달 설정하기",en:"↪️ Forward Your Mail"},
  sub:{ko:"새 Gmail로 온 메일을 원래 쓰던 편지함에서도 받아요 😊",en:"Get mail from your new Gmail in the inbox you already use 😊"},
  skip:{ko:"건너뛰기 ›",en:"Skip ›"}, got:{ko:"알겠어요 ›",en:"Got it ›"},
  restart:{ko:"다시 하기 🔁",en:"Play again 🔁"}, hub:{ko:"🏠 수업 목록으로",en:"🏠 Back to lessons"},
  finalTitle:{ko:"전달 설정 완료!",en:"Forwarding is on!"},
  finalMsg:{ko:"이제 새 크리에이터 Gmail로 오는 메일이 <b>원래 편지함</b>에도 사본으로 도착해요. 편지함 한 곳만 봐도 다 확인돼요! 다음 수업에서 <b>새 인스타그램</b>을 만들어요. 💛",
            en:"Now mail sent to your new creator Gmail also arrives as a copy in your <b>usual inbox</b>. Check one place and you see everything! Next, we'll make a <b>new Instagram</b>. 💛"},
  step:{ko:(a,b)=>`${a} / ${b} 단계`,en:(a,b)=>`Step ${a} / ${b}`}, finalStep:{ko:"완료! 🎊",en:"Done! 🎊"}
};
function applyStatic(){
  document.documentElement.lang=LANG;
  document.getElementById("h1").textContent=T(UI.h1);
  document.getElementById("sub").textContent=T(UI.sub);
  document.getElementById("skipBtn").textContent=T(UI.skip);
  document.getElementById("restartBtn").textContent=T(UI.restart);
  document.getElementById("hubLink").textContent=T(UI.hub);
  document.getElementById("finalTitle").textContent=T(UI.finalTitle);
  document.getElementById("finalMsg").innerHTML=T(UI.finalMsg);
  document.querySelectorAll("#langToggle button").forEach(b=>b.classList.toggle("on",b.dataset.l===LANG));
}
function setLang(l){ LANG=l; localStorage.setItem("momLang",l); applyStatic();
  if(els.final.style.display==="flex"){ els.step.textContent=T(UI.finalStep); } else if(!doneLock){ loadLevel(current); } }

const PRAISE={ko:["잘했어요! 🎉","완벽해요! 👏","최고예요! ⭐","멋져요! 💖","정확해요! ✨"],
              en:["Well done! 🎉","Perfect! 👏","Great! ⭐","Lovely! 💖","Exactly! ✨"]};
const praise=()=>{const a=PRAISE[LANG]||PRAISE.ko;return a[Math.floor(Math.random()*a.length)];};
let actx=null;
function beep(f=660,d=.14){try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type="sine";o.frequency.value=f;
  g.gain.setValueAtTime(.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(.22,actx.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+d);}catch(e){}}
const chime=()=>{beep(660,.12);setTimeout(()=>beep(880,.16),110);};
function confetti(){const E=["🎉","✨","💖","⭐","🌸","🎊","💛"];for(let i=0;i<24;i++){const c=document.createElement("div");
  c.className="confetti";c.textContent=E[Math.floor(Math.random()*E.length)];c.style.left=Math.random()*100+"vw";
  c.style.animationDuration=(1.6+Math.random()*1.4)+"s";c.style.fontSize=(18+Math.random()*20)+"px";
  document.body.appendChild(c);setTimeout(()=>c.remove(),3200);} }

const stage=document.getElementById("stage");
function clear(){ stage.innerHTML=""; }
const NEWMAIL="mom.cooking@gmail.com", MAINMAIL="mom.personal@gmail.com";
function gmailShell(inner){
  return `<div class="gmail"><div class="gtop"><div class="gm-logo">M <span>${NEWMAIL}</span></div>
    <div class="gsearch">🔍 ${T({ko:"메일 검색",en:"Search mail"})}</div>
    <div class="ggear" id="gear">⚙️</div></div><div class="gpanel">${inner}</div></div>`;
}
function gotButton(api){ const b=document.createElement("button"); b.className="gotBtn pulseR"; b.textContent=T(UI.got);
  b.onclick=()=>{ if(doneLock)return; beep(720,.08); api.next(); }; return b; }

/* ===== levels ===== */
const levels=[
  { title:{ko:"‘전달’이 뭐예요?",en:"What is ‘forwarding’?"},
    instr:{ko:"편지가 오면 <b>자동으로 다른 주소에도 사본</b>을 보내는 거예요. 편지함을 <b>한 곳</b>만 봐도 되니 편해요.",
           en:"It automatically sends a <b>copy to another address</b> when mail arrives. So you only check <b>one inbox</b>."},
    hint:{ko:"그림을 보고 알겠어요를 눌러요.",en:"See the picture, then tap Got it."},
    info:true,
    build(api){ clear();
      const d=document.createElement("div"); d.className="story";
      d.innerHTML=`<div class="art">📨 ➡️ 📥</div>
        <div class="flow"><span class="box">${NEWMAIL}</span><span>↪️</span><span class="box old">${MAINMAIL}</span></div>
        <div class="txt" style="margin-top:10px;">${T({ko:"새 크리에이터 주소로 온 편지가 <b>원래 쓰던 편지함</b>에도 도착하게 만들 거예요.",
          en:"We'll make mail sent to the new creator address also arrive in the <b>inbox you already use</b>."})}</div>`;
      d.appendChild(gotButton(api)); stage.appendChild(d);
    } },

  { title:{ko:"설정(⚙️) 열기",en:"Open Settings (⚙️)"},
    instr:{ko:"오른쪽 위 <b>톱니바퀴(⚙️)</b>를 눌러 설정을 열어요.",en:"Tap the <b>gear (⚙️)</b> at the top right to open settings."},
    hint:{ko:"반짝이는 톱니바퀴를 눌러요.",en:"Tap the glowing gear."},
    build(api){ clear();
      const d=document.createElement("div"); d.style.maxWidth="600px"; d.style.width="100%";
      d.innerHTML=gmailShell(`<div style="color:#5f6368;font-size:14px;">${T({ko:"받은편지함 · 편지 3통",en:"Inbox · 3 messages"})}</div>
        <div style="margin-top:10px;border:1px solid #eee;border-radius:8px;padding:12px;font-size:14px;">📩 ${T({ko:"구독해 주셔서 감사합니다",en:"Thanks for subscribing"})}</div>`);
      stage.appendChild(d);
      const gear=document.getElementById("gear"); gear.classList.add("pulse");
      gear.onclick=()=>{ if(doneLock)return; beep(760,.09); api.done("⚙️",{ko:"설정을 열었어요!",en:"Settings opened!"}); };
    } },

  { title:{ko:"‘모든 설정 보기’ 누르기",en:"Tap ‘See all settings’"},
    instr:{ko:"작은 메뉴가 열리면 <b>모든 설정 보기</b>를 눌러요.",en:"When the little menu opens, tap <b>See all settings</b>."},
    hint:{ko:"파란 테두리 단추를 눌러요.",en:"Tap the outlined button."},
    build(api){ clear();
      const d=document.createElement("div"); d.style.maxWidth="600px"; d.style.width="100%";
      d.innerHTML=gmailShell(`<div class="quickset"><div class="qh">${T({ko:"빠른 설정",en:"Quick settings"})}</div>
        <button class="qbtn pulse tapme" id="allset">${T({ko:"모든 설정 보기",en:"See all settings"})}</button></div>`);
      stage.appendChild(d);
      document.getElementById("allset").onclick=()=>{ if(doneLock)return; beep(760,.09);
        api.done("🗂️",{ko:"전체 설정을 열었어요!",en:"Opened all settings!"}); };
    } },

  { title:{ko:"‘전달 및 POP/IMAP’ 탭 열기",en:"Open the ‘Forwarding’ tab"},
    instr:{ko:"위쪽 탭 줄에서 <b>전달 및 POP/IMAP</b>을 눌러요.",en:"In the tab row, tap <b>Forwarding and POP/IMAP</b>."},
    hint:{ko:"반짝이는 탭을 눌러요.",en:"Tap the glowing tab."},
    build(api){ clear();
      const d=document.createElement("div"); d.style.maxWidth="600px"; d.style.width="100%";
      const tabs=[{ko:"일반",en:"General"},{ko:"라벨",en:"Labels"},{ko:"받은편지함",en:"Inbox"},{ko:"전달 및 POP/IMAP",en:"Forwarding and POP/IMAP",tgt:true}];
      d.innerHTML=gmailShell(`<div class="tabs">${tabs.map((t,i)=>`<div class="tab ${t.tgt?'pulse tapme':''}" ${t.tgt?'id="ftab"':''}>${T(t)}</div>`).join("")}</div>
        <div style="color:#5f6368;font-size:14px;">${T({ko:"설정 항목이 여기에 나와요",en:"Settings appear here"})}</div>`);
      stage.appendChild(d);
      document.getElementById("ftab").onclick=()=>{ if(doneLock)return; beep(760,.09);
        api.done("📑",{ko:"전달 탭을 열었어요!",en:"Opened the Forwarding tab!"}); };
    } },

  { title:{ko:"전달 주소 추가하기",en:"Add a forwarding address"},
    instr:{ko:"<b>전달 주소 추가</b>를 눌러요. 원래 편지함 주소는 이미 적어 두었으니 <b>다음</b>을 눌러요. 그 주소로 <b>확인 코드</b>가 한 번 가요.",
           en:"Tap <b>Add a forwarding address</b>. Your usual address is filled in — tap <b>Next</b>. A one-time <b>confirmation code</b> is sent there."},
    hint:{ko:"먼저 회색 단추, 그다음 파란 ‘다음’.",en:"Tap the grey button, then blue ‘Next’."},
    build(api){ clear();
      const d=document.createElement("div"); d.style.maxWidth="600px"; d.style.width="100%";
      d.innerHTML=gmailShell(`<div class="setrow">${T({ko:"전달:",en:"Forwarding:"})} <span style="color:#5f6368;">${T({ko:"아직 전달 주소가 없어요",en:"No forwarding address yet"})}</span></div>
        <button class="linkbtn pulse tapme" id="addr">${T({ko:"＋ 전달 주소 추가",en:"＋ Add a forwarding address"})}</button>
        <div id="addrForm" style="display:none;margin-top:12px;">
          <div class="gfield"><div class="gbox">${MAINMAIL}</div></div>
          <button class="gbtn tapme" id="nx">${T({ko:"다음",en:"Next"})}</button>
        </div>`);
      stage.appendChild(d);
      document.getElementById("addr").onclick=function(){ if(doneLock)return; beep(700,.06);
        this.classList.remove("pulse"); this.style.display="none"; const f=document.getElementById("addrForm"); f.style.display="block";
        document.getElementById("nx").classList.add("pulse"); };
      document.getElementById("nx").onclick=()=>{ if(doneLock)return; beep(760,.09);
        api.done("📤",{ko:"확인 코드를 보냈어요!",en:"Confirmation code sent!"}); };
    } },

  { title:{ko:"사본 보관 고르고 저장하기",en:"Keep a copy & save"},
    instr:{ko:"확인을 마치면, <b>받은편지함에 Gmail 사본 보관</b>을 고르고 맨 아래 <b>변경사항 저장</b>을 눌러요.",
           en:"After confirming, choose <b>keep Gmail's copy in the Inbox</b>, then tap <b>Save changes</b> at the bottom."},
    hint:{ko:"동그라미를 골라 켠 뒤, 파란 저장 단추를 눌러요.",en:"Select the circle, then tap the blue Save button."},
    build(api){ clear();
      const d=document.createElement("div"); d.style.maxWidth="600px"; d.style.width="100%";
      d.innerHTML=gmailShell(`<div class="setrow">${T({ko:"전달:",en:"Forwarding:"})}</div>
        <div class="radio tapme sel" data-off><span class="rc"></span><span>${T({ko:"전달 사용 안 함",en:"Disable forwarding"})}</span></div>
        <div class="radio tapme" id="onOpt"><span class="rc"></span><span>${T({ko:"받는 메일을 <b>"+MAINMAIL+"</b>(으)로 전달하고 <b>받은편지함에 Gmail 사본 보관</b>",en:"Forward a copy to <b>"+MAINMAIL+"</b> and <b>keep Gmail's copy in the Inbox</b>"})}</span></div>
        <div class="savebar"><button class="gbtn tapme" id="save" style="opacity:.45;">${T({ko:"변경사항 저장",en:"Save changes"})}</button></div>`);
      stage.appendChild(d);
      let on=false; const save=document.getElementById("save");
      const off=d.querySelector("[data-off]"), onOpt=document.getElementById("onOpt");
      onOpt.onclick=()=>{ if(doneLock)return; beep(700,.06); on=true; onOpt.classList.add("sel"); off.classList.remove("sel");
        save.style.opacity="1"; save.classList.add("pulse"); };
      save.onclick=()=>{ if(doneLock||!on)return; beep(760,.09);
        api.done("💾",{ko:"전달을 저장했어요!",en:"Forwarding saved!"}); };
    } },

  { title:{ko:"이제 한 곳에서 다 봐요",en:"Now it's all in one place"},
    instr:{ko:"잘하셨어요! 새 주소로 온 메일이 <b>원래 편지함</b>에도 도착해요. 매번 계정을 바꿔 로그인하지 않아도 돼요.",
           en:"Great! Mail to the new address now also lands in your <b>usual inbox</b>. No need to log in and switch every time."},
    hint:{ko:"그림을 보고 마무리해요.",en:"See the picture, then finish."},
    info:true,
    build(api){ clear();
      const d=document.createElement("div"); d.className="story";
      d.innerHTML=`<div class="done-badge">📥</div>
        <div class="flow"><span class="box">${NEWMAIL}</span><span>↪️</span><span class="box old">${MAINMAIL}</span><span>✅</span></div>
        <div class="txt" style="margin-top:10px;">${T({ko:"두 주소의 메일을 <b>한 편지함</b>에서 확인해요.",en:"Read mail from both addresses in <b>one inbox</b>."})}</div>`;
      d.appendChild(gotButton(api)); stage.appendChild(d);
    } }
];

/* ===== engine ===== */
let current=0,doneLock=false;
const els={ bar:document.getElementById("progressBar"),step:document.getElementById("stepText"),
  main:document.getElementById("mainView"),final:document.getElementById("finalScreen"),
  overlay:document.getElementById("successOverlay"),msg:document.getElementById("successMsg"),
  skip:document.getElementById("skipBtn") };
const banner={t:document.getElementById("bTitle"),i:document.getElementById("bInstr"),h:document.getElementById("bHint")};
const api={ done:onLevelDone, next:goNext };
function loadLevel(i){ doneLock=false; const lv=levels[i];
  banner.t.textContent=T(lv.title); banner.i.innerHTML=T(lv.instr); banner.h.textContent="💡 "+T(lv.hint);
  els.step.textContent=UI.step[LANG](i+1,levels.length); els.bar.style.width=(i/levels.length*100)+"%";
  requestAnimationFrame(()=>lv.build(api)); }
function advance(){ current++; if(current>=levels.length) showFinal(); else loadLevel(current); }
function goNext(){ if(doneLock) return; doneLock=true; els.bar.style.width=((current+1)/levels.length*100)+"%"; setTimeout(advance,180); }
function onLevelDone(emoji,msg){ if(doneLock) return; doneLock=true;
  els.bar.style.width=((current+1)/levels.length*100)+"%";
  setTimeout(()=>{ els.msg.textContent=msg?T(msg):praise(); els.overlay.querySelector(".be").textContent=emoji||"🎉";
    els.overlay.style.display="flex"; confetti(); chime(); },350);
  setTimeout(()=>{ els.overlay.style.display="none"; advance(); },1900); }
function skipLevel(){ if(doneLock) return; advance(); }
function showFinal(){ els.main.style.display="none"; els.skip.style.display="none"; els.final.style.display="flex";
  try{localStorage.setItem("momHub:done:gmailforward","1");}catch(e){}
  els.bar.style.width="100%"; els.step.textContent=T(UI.finalStep); confetti(); setTimeout(confetti,500); chime(); }
function restart(){ current=0; doneLock=false; els.main.style.display="flex"; els.skip.style.display="block";
  els.final.style.display="none"; loadLevel(0); }
document.querySelectorAll("#langToggle button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.l)));
document.addEventListener("gesturestart",e=>e.preventDefault());
applyStatic(); loadLevel(0);
</script>
